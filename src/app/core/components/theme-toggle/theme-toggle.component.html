<!-- Desktop: inline button group (visible at ≥768px) -->
<div class="theme-toggle-desktop" role="group" aria-label="Theme selection">
  <button
    type="button"
    class="theme-btn"
    [class.active]="themeMode() === 'light'"
    [attr.aria-pressed]="themeMode() === 'light'"
    aria-label="Switch to light theme"
    (click)="setTheme('light')"
  >
    <!-- Sun icon -->
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
  </button>

  <button
    type="button"
    class="theme-btn"
    [class.active]="themeMode() === 'dark'"
    [attr.aria-pressed]="themeMode() === 'dark'"
    aria-label="Switch to dark theme"
    (click)="setTheme('dark')"
  >
    <!-- Moon icon -->
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>

  <button
    type="button"
    class="theme-btn"
    [class.active]="themeMode() === 'system'"
    [attr.aria-pressed]="themeMode() === 'system'"
    aria-label="Switch to system theme"
    (click)="setTheme('system')"
  >
    <!-- Monitor icon -->
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
      <line x1="8" y1="21" x2="16" y2="21"></line>
      <line x1="12" y1="17" x2="12" y2="21"></line>
    </svg>
  </button>
</div>

<!-- Mobile: single icon button + dropdown (visible at <768px) -->
<div class="theme-toggle-mobile">
  <button
    type="button"
    class="theme-btn mobile-trigger"
    [attr.aria-expanded]="dropdownOpen()"
    aria-haspopup="true"
    [attr.aria-label]="'Theme: ' + themeMode() + '. Open theme menu'"
    (click)="toggleDropdown()"
  >
    <!-- Show icon based on effective theme -->
    @if (effectiveTheme() === 'light') {
      <!-- Sun icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    } @else {
      <!-- Moon icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    }
  </button>

  @if (dropdownOpen()) {
    <div class="theme-dropdown" role="menu" aria-label="Theme options">
      <button
        type="button"
        class="theme-dropdown-item"
        role="menuitem"
        [class.active]="themeMode() === 'light'"
        [attr.aria-pressed]="themeMode() === 'light'"
        aria-label="Switch to light theme"
        (click)="setTheme('light')"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <span>Light</span>
      </button>

      <button
        type="button"
        class="theme-dropdown-item"
        role="menuitem"
        [class.active]="themeMode() === 'dark'"
        [attr.aria-pressed]="themeMode() === 'dark'"
        aria-label="Switch to dark theme"
        (click)="setTheme('dark')"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <span>Dark</span>
      </button>

      <button
        type="button"
        class="theme-dropdown-item"
        role="menuitem"
        [class.active]="themeMode() === 'system'"
        [attr.aria-pressed]="themeMode() === 'system'"
        aria-label="Switch to system theme"
        (click)="setTheme('system')"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
          <line x1="8" y1="21" x2="16" y2="21"></line>
          <line x1="12" y1="17" x2="12" y2="21"></line>
        </svg>
        <span>System</span>
      </button>
    </div>
  }
</div>
