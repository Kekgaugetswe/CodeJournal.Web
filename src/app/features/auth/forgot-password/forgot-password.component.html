<div class="container">
  <div class="mt-5">
    <div class="col-12 col-md-6 col-lg-4 mx-auto">
      <h1>Forgot Password</h1>

      <!-- Form State -->
      <div *ngIf="!submitted">
        <p class="text-muted">Enter your email address and we'll send you a link to reset your password.</p>

        <form (ngSubmit)="onSubmit()">
          <div class="mt-3">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder="Enter your email"
              [(ngModel)]="email"
              required
            />
          </div>

          <div class="mt-3">
            <button type="submit" class="btn btn-primary" [disabled]="loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
              Send Reset Link
            </button>
          </div>
        </form>

        <div class="mt-3">
          <a routerLink="/login" class="text-decoration-none">Back to Login</a>
        </div>
      </div>

      <!-- Success State -->
      <div *ngIf="submitted">
        <div class="alert alert-success mt-3">
          {{ message }}
        </div>
        <p class="text-muted">Check your email for the reset link. It may take a few minutes to arrive.</p>
        <a routerLink="/login" class="btn btn-primary mt-3">Back to Login</a>
      </div>
    </div>
  </div>
</div>
