<div class="page-header">
  <div class="container">
    <h1>Category List</h1>
  </div>
</div>

<div class="container py-4">
  <div class="d-flex justify-content-between mb-4">
    <div class="d-flex">
      <label for="categorySearchInput" class="visually-hidden">Search categories</label>
      <input type="text" id="categorySearchInput" class="form-control" #queryText />
      <button class="btn btn-primary ms-3" (click)="onSearch(queryText.value)">
        Search
      </button>
    </div>
    <a class="btn btn-primary" [routerLink]="['/admin/categories/add']">Add Category</a>
  </div>

  @if (categories$ | async; as categories) {
    <div class="table-card">
      <table class="table table-bordered mb-0">
        <thead>
          <tr>
            <th>Id</th>
            <th>
              Name
              <span>
                <button
                  type="button"
                  class="btn btn-light btn-sm"
                  (click)="sort('name', 'asc')"
                >
                  <i class="bi bi-arrow-up"></i>
                </button>
                <button
                  type="button"
                  class="btn btn-light btn-sm"
                  (click)="sort('name', 'desc')"
                >
                  <i class="bi bi-arrow-down"></i>
                </button>
              </span>
            </th>
            <th>Url Handle</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          @for (category of categories; track category) {
            <tr>
              <td>{{ category.id }}</td>
              <td>{{ category.name }}</td>
              <td>{{ category.urlHandle }}</td>
              <td>
                <a
                  [routerLink]="['/admin/categories', category.id]"
                  class="btn btn-sm btn-outline-primary"
                >Edit</a>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <app-pagination
      [currentPage]="pageNumber"
      [totalPages]="list.length"
      [totalCount]="totalCount ?? 0"
      (pageChange)="onPageChange($event)">
    </app-pagination>
  }
</div>
